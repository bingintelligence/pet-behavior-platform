name: pet-behavior-platform

services:
  api:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: pet-behavior-api
    command:
      - uvicorn
      - services.api_gateway.src.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://pet_platform:pet_platform@postgres:5432/pet_platform
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: pet-media
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pet-platform
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: workers/behavior-analysis-worker/Dockerfile
    container_name: pet-behavior-worker
    command:
      - python
      - -m
      - workers.behavior_analysis_worker.src.main
    volumes:
      - .:/app
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://pet_platform:pet_platform@postgres:5432/pet_platform
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: pet-media
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      MODEL_DEVICE: cpu
      MODEL_STORAGE_PATH: /models
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pet-platform
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: pet-behavior-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pet_platform
      POSTGRES_USER: pet_platform
      POSTGRES_PASSWORD: pet_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U pet_platform -d pet_platform
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pet-platform
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pet-behavior-redis
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pet-platform
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.9
    container_name: pet-behavior-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test:
        - CMD-SHELL
        - kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - pet-platform
    restart: unless-stopped

  kafka-init:
    image: bitnami/kafka:3.9
    container_name: pet-behavior-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
    command: |
      kafka-topics.sh \
        --bootstrap-server kafka:29092 \
        --create \
        --if-not-exists \
        --topic pet-analysis-jobs \
        --partitions 3 \
        --replication-factor 1

      kafka-topics.sh \
        --bootstrap-server kafka:29092 \
        --create \
        --if-not-exists \
        --topic pet-analysis-results \
        --partitions 3 \
        --replication-factor 1

      kafka-topics.sh \
        --bootstrap-server kafka:29092 \
        --create \
        --if-not-exists \
        --topic pet-analysis-dead-letter \
        --partitions 3 \
        --replication-factor 1
    networks:
      - pet-platform
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: pet-behavior-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pet-platform
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: pet-behavior-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
    command: |
      mc alias set local http://minio:9000 minioadmin minioadmin
      mc mb --ignore-existing local/pet-media
      mc anonymous set none local/pet-media
    networks:
      - pet-platform
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    container_name: pet-behavior-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
    networks:
      - pet-platform
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pet-behavior-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - pet-platform
    restart: unless-stopped

networks:
  pet-platform:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:
